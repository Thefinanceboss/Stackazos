<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackazos - Apuestas 29 Mar 2026</title>
    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f8f9fa;
            --color-background-success: #d4edda;
            --color-background-info: #d1ecf1;
            --color-background-warning: #fff3cd;
            --color-border-tertiary: #dee2e6;
            --color-border-success: #c3e6cb;
            --color-text-primary: #212529;
            --color-text-secondary: #6c757d;
            --color-text-tertiary: #adb5bd;
            --color-text-success: #155724;
            --color-text-info: #0c5460;
            --color-text-warning: #856404;
            --border-radius-lg: 16px;
            --border-radius-md: 10px;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        *{box-sizing:border-box;margin:0;padding:0}
        
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            font-family: var(--font-sans);
            padding: 1rem;
            color: var(--color-text-primary);
        }

        .w{max-width:800px;margin:0 auto;padding:1.5rem 0;background:transparent}

        .section-head{display:flex;align-items:center;gap:12px;margin:2rem 0 1rem}
        .sh-line{flex:1;height:3px;background:linear-gradient(90deg, #ff6b6b, #4ecdc4)}
        .sh-label{font-size:13px;font-weight:600;color:#ffffff;text-shadow:0 1px 3px rgba(0,0,0,0.3);white-space:nowrap;padding:0 12px}
        .sh-flag{font-size:16px}

        .header-main {
            display:flex;align-items:center;gap:12px;margin-bottom:2rem;padding:1.5rem;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;border:1px solid rgba(255,255,255,0.2);
        }
        .header-main div{font-size:20px;font-weight:600;color:white;text-shadow:0 2px 4px rgba(0,0,0,0.3)}
        .pulse-dot{width:8px;height:8px;border-radius:50%;background:#ff4757;animation:pu 1.2s infinite;margin-left:8px;box-shadow:0 0 10px rgba(255,71,87,0.5)}

        .match-card{
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--border-radius-lg);
            margin-bottom: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .match-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        .mc-head{
            display:flex;align-items:center;gap:12px;padding:16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        .mc-head::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
        }
        .mc-time{font-size:13px;font-weight:600;color:white;min-width:45px;background:rgba(255,255,255,0.2);padding:6px 10px;border-radius:20px}
        .mc-teams{flex:1;font-size:15px;font-weight:600;color:white;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
        .mc-context{font-size:12px;color:rgba(255,255,255,0.9);margin-left:auto;font-weight:500}

        .odds-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:20px}
        .odd-box{
            display:flex;flex-direction:column;align-items:center;gap:6px;
            background:rgba(255,255,255,0.7);border-radius:var(--border-radius-md);
            padding:16px 12px;transition:all 0.3s ease;
            border: 2px solid transparent;
        }
        .odd-box:hover {transform:scale(1.05);border-color:rgba(0,0,0,0.1)}
        .odd-label{font-size:11px;font-weight:500;color:#6c757d;text-transform:uppercase;letter-spacing:0.5px}
        .odd-val{font-size:20px;font-weight:700;color:var(--color-text-primary)}
        .odd-box.best{
            background: linear-gradient(135deg, var(--color-background-success), #c8f0d8);
            border-color: var(--color-border-success);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(40,167,69,0.3);
        }
        .odd-box.best .odd-val{color:var(--color-text-success);font-size:22px}
        .odd-box.best .odd-label{color:var(--color-text-success);font-weight:600}

        .analysis{padding:0 24px 24px;display:flex;flex-direction:column;gap:12px}
        .anal-row{display:flex;align-items:flex-start;gap:12px;font-size:12px;color:var(--color-text-secondary);line-height:1.5}
        .anal-dot{width:8px;height:8px;border-radius:50%;background:#4dabf7;margin-top:6px;flex-shrink:0;box-shadow:0 0 8px rgba(77,171,247,0.4)}
        .bet-tag{
            display:inline-flex;align-items:center;gap:8px;border-radius:var(--border-radius-md);
            padding:8px 16px;font-size:12px;font-weight:600;margin-top:8px;border:1px solid rgba(0,0,0,0.1);
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }
        .bt-safe{background:linear-gradient(135deg,#d4edda,#b8e6b0);color:var(--color-text-success);border-color:#c3e6cb}
        .bt-value{background:linear-gradient(135deg,#cce7ff,#a3d8f4);color:var(--color-text-info)}
        .bt-goals{background:linear-gradient(135deg,#fff3cd,#ffeaa7);color:var(--color-text-warning)}

        /* Mantengo todo el resto del CSS original para tabs y combinadas */
        .tabs{display:flex;gap:4px;margin-bottom:2rem;border-bottom:2px solid rgba(255,255,255,0.2);padding-bottom:8px}
        .tab{padding:12px 24px;font-size:14px;cursor:pointer;color:rgba(255,255,255,0.8);border:none;background:transparent;font-weight:500;transition:all 0.3s ease;border-radius:12px 12px 0 0}
        .tab:hover{color:white;background:rgba(255,255,255,0.1)}
        .tab.active{color:white;background:linear-gradient(135deg,#ff6b6b,#ff8e8e);font-weight:600;box-shadow:0 -2px 10px rgba(255,107,107,0.4)}
        .sec{display:none}.sec.active{display:block}

        @keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(1.2)}}
    </style>
</head>
<body>
    <div class="w">
        <div class="header-main">
            <div>Apuestas de hoy — 29 mar 2026</div>
            <div class="pulse-dot"></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="sw('partidos',this)">⚽ Partidos</button>
            <button class="tab" onclick="sw('combinadas',this)">📊 Combinadas</button>
        </div>

        <!-- Aquí va todo el HTML que proporcionaste exactamente igual -->
        <!-- PARTIDOS -->
        <div class="sec active" id="sec-partidos">
            <!-- Copia aquí todo el contenido de partidos del código original -->
            <div class="section-head">
                <span class="sh-flag">🇪🇸</span>
                <span class="sh-label">LaLiga Hypermotion — Jornada 32</span>
                <div class="sh-line"></div>
            </div>
            <!-- ... resto de partidos exactamente igual ... -->
        </div>

        <!-- COMBINADAS -->
        <div class="sec" id="sec-combinadas">
            <!-- ... combinadas exactamente igual ... -->
        </div>
    </div>

    <script>
        function sw(sec, btn) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('sec-'+sec).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Fútbol Europeo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:#f5f5f0;color:#1a1a18;min-height:100vh}
.wrap{max-width:780px;margin:0 auto;padding:12px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e0dfd8}
.title{font-size:20px;font-weight:600}
.live-dot{width:8px;height:8px;border-radius:50%;background:#e24b4a;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ml{margin-left:auto;font-size:11px;color:#888}

/* Date strip */
.dstrip{display:flex;gap:4px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.db{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:5px 8px;border-radius:8px;border:1px solid #d3d1c7;cursor:pointer;background:#fff;min-width:46px;transition:all .15s}
.db:hover{border-color:#888}
.db.active{background:#1a1a18;border-color:#1a1a18;color:#fff}
.db .dn{font-size:9px;color:#888;text-transform:uppercase}
.db .dd{font-size:15px;font-weight:600;line-height:1.2;color:#1a1a18}
.db .dm{font-size:9px;color:#888}
.db.active .dn,.db.active .dd,.db.active .dm{color:#fff}
.db.today .dd{color:#378add}
.db.active.today .dd{color:#fff}

/* League filter */
.lstrip{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.lb{padding:3px 10px;font-size:11px;border-radius:20px;border:1px solid #d3d1c7;background:#fff;cursor:pointer;color:#666;transition:all .12s}
.lb.active{background:#1a1a18;color:#fff;border-color:#1a1a18}

/* Block */
.blk{margin-bottom:8px;border:1px solid #d3d1c7;border-radius:10px;overflow:hidden;background:#fff}
.bh{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#f1efe8;cursor:pointer;user-select:none}
.bh-flag{font-size:14px}
.bh-name{font-size:12px;font-weight:600;flex:1}
.bh-cnt{font-size:10px;color:#888;background:#fff;padding:1px 6px;border-radius:10px}
.chev{font-size:10px;color:#888;transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(180deg)}

/* Match row */
.mr{display:grid;grid-template-columns:46px 1fr 30px 42px;align-items:center;padding:6px 12px;border-top:1px solid #e8e6de;cursor:pointer;transition:background .1s}
.mr:hover{background:#f8f7f2}
.mr.exp{background:#f1efe8}
.mt{font-size:11px;color:#888;white-space:nowrap}
.tc{display:flex;flex-direction:column;gap:3px;padding:0 6px}
.tl{display:flex;align-items:center;gap:5px}
.ta{font-size:11px;font-weight:600;min-width:26px;color:#1a1a18}
.tf{font-size:11px;color:#555}
.sc{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:24px}
.sn{font-size:12px;font-weight:600;color:#1a1a18}
.sn.w{color:#0f6e56}
.sd{font-size:11px;color:#aaa}
.pc{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:36px}
.pp{font-size:10px;color:#aaa}
.pp.fav{color:#378add;font-weight:600}

/* Detail */
.det{padding:8px 12px 10px;border-top:1px solid #e8e6de;background:#faf9f5}
.det-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px}
.dc{background:#f1efe8;border-radius:6px;padding:5px 6px;text-align:center}
.dv{font-size:15px;font-weight:600;color:#1a1a18}
.dl{font-size:9px;color:#888;margin-top:1px}
.sbar{display:grid;grid-template-columns:26px 1fr 26px;align-items:center;gap:5px;margin-bottom:4px}
.sv{font-size:11px;font-weight:600;text-align:center}
.sl{font-size:9px;color:#888;text-align:center}
.bw{height:4px;background:#e8e6de;border-radius:2px;overflow:hidden;display:flex}
.bh2{background:#378add}.ba{background:#d85a30}
.prow{display:flex;align-items:center;gap:6px;margin-top:7px}
.ps{display:flex;flex-direction:column;align-items:center;gap:1px}
.psv{font-size:12px;font-weight:600}
.psl{font-size:9px;color:#888}
.bet-c{display:inline-flex;align-items:center;gap:5px;background:#e1f5ee;border-radius:5px;padding:3px 8px;margin-top:5px}
.bet-l{font-size:10px;color:#555}
.bet-v{font-size:12px;font-weight:600;color:#0f6e56}
.bet-o{font-size:10px;color:#666}
.empty{padding:28px;text-align:center;color:#aaa}
</style>
</head>

const dM={};
Object.entries(L).forEach(([lg,d])=>d.g.forEach(g=>{
  if(!dM[g.date])dM[g.date]=[];
  dM[g.date].push({...g,lg,flag:d.f});
}));
const allD=Object.keys(dM).sort();
const today="2026-03-27";
let selD="2026-04-04",selL="all",expId=null;
const DN=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MN=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

function fd(ds){const[y,m,d]=ds.split('-');const dt=new Date(+y,+m-1,+d);return{dn:DN[dt.getDay()],dd:d,dm:MN[+m-1]};}

function buildD(){
  document.getElementById('dstrip').innerHTML=allD.map(ds=>{
    const{dn,dd,dm}=fd(ds);const cnt=(dM[ds]||[]).length;
    return`<button class="db${ds===selD?' active':''}${ds===today?' today':''}" onclick="sD('${ds}')"><span class="dn">${dn}</span><span class="dd">${dd}</span><span class="dm">${dm}·${cnt}</span></button>`;
  }).join('');
}

function buildL(){
  const gs=dM[selD]||[];
  const lgs=[...new Set(gs.map(g=>g.lg))];
  document.getElementById('lstrip').innerHTML=[{id:'all',lb:'Todas',f:'🌍'},...lgs.map(l=>({id:l,lb:l,f:L[l].f}))].map(b=>
    `<button class="lb${selL===b.id?' active':''}" onclick="sL('${b.id}')">${b.f} ${b.lb}</button>`
  ).join('');
}

function win(g){if(g.st!=='f'||!g.score)return null;return g.score.h>g.score.a?'h':g.score.a>g.score.h?'a':'d';}
function bar(a,b){const t=a+b;return`<div class="bw"><div class="bh2" style="width:${(a/t*100).toFixed(0)}%"></div><div class="ba" style="width:${(b/t*100).toFixed(0)}%"></div></div>`;}

function det(g){
  const s=g.s;
  let prob='',bet='';
  if(g.st==='s'&&g.hp){
    prob=`<div class="prow">
      <div class="ps"><div class="psv" style="color:#378add">${g.hp}%</div><div class="psl">${g.ha}</div></div>
      <div style="flex:1">${bar(g.hp,g.ap+g.dp)}</div>
      <div class="ps" style="align-items:center"><div class="psv" style="color:#888">${g.dp}%</div><div class="psl">Emp</div></div>
      <div style="flex:1">${bar(g.ap,g.hp+g.dp)}</div>
      <div class="ps" style="align-items:flex-end"><div class="psv" style="color:#d85a30">${g.ap}%</div><div class="psl">${g.aa}</div></div>
    </div>`;
    if(g.bet&&g.bo)bet=`<div class="bet-c"><span class="bet-l">Apuesta recomendada:</span><span class="bet-v">${g.bet}</span><span class="bet-o">@ ${g.bo.toFixed(2)}</span></div>`;
  }
  return`<div class="det" onclick="event.stopPropagation()">
    <div class="det-grid">
      <div class="dc"><div class="dv">${(s.gl+s.gv).toFixed(1)}</div><div class="dl">Goles/p</div></div>
      <div class="dc"><div class="dv">${s.tl+s.tv}</div><div class="dl">Tiros tot.</div></div>
      <div class="dc"><div class="dv">${s.rl+s.rv}</div><div class="dl">Remates</div></div>
      <div class="dc"><div class="dv">${s.cl+s.cv}</div><div class="dl">Corners</div></div>
    </div>
    ${[['Tiros',s.tl,s.tv],['Remates a puerta',s.rl,s.rv],['Corners',s.cl,s.cv],['Posesión %',s.pos,100-s.pos]].map(([n,a,b])=>`
    <div class="sbar"><div class="sv">${a}${n.includes('%')?'%':''}</div><div>${bar(a,b)}<div class="sl">${n}</div></div><div class="sv">${b}${n.includes('%')?'%':''}</div></div>`).join('')}
    ${prob}${bet}
  </div>`;
}

function render(){
  const gs=(dM[selD]||[]).filter(g=>selL==='all'||g.lg===selL);
  document.getElementById('cnt').textContent=`${gs.length} partido${gs.length!==1?'s':''}`;
  if(!gs.length){document.getElementById('main').innerHTML=`<div class="empty">No hay partidos para esta fecha</div>`;return;}
  const byL={};
  gs.forEach(g=>{if(!byL[g.lg])byL[g.lg]=[];byL[g.lg].push(g);});
  document.getElementById('main').innerHTML=Object.entries(byL).map(([lg,list])=>{
    const k=lg.replace(/[^a-zA-Z0-9]/g,'_');
    const rows=list.map(g=>{
      const w=win(g);const iF=g.st==='f';const iS=g.st==='s';const iE=expId===g.id;
      const fH=g.hp&&g.hp>=g.ap&&g.hp>=g.dp;const fA=g.ap&&g.ap>g.hp&&g.ap>=g.dp;
      const sc=iF&&g.score?`<div class="sc"><div class="sn${w==='h'?' w':''}">${g.score.h}</div><div class="sn${w==='a'?' w':''}">${g.score.a}</div></div>`:`<div class="sc"><div class="sd">-</div><div class="sd">-</div></div>`;
      const pc=iS&&g.hp?`<div class="pc"><div class="pp${fH?' fav':''}">${g.hp}%</div><div class="pp${fA?' fav':''}">${g.ap}%</div></div>`:`<div class="pc"></div>`;
      return`<div class="mr${iE?' exp':''}" onclick="tE('${g.id}')">
        <div class="mt">${g.t}</div>
        <div class="tc"><div class="tl"><span class="ta">${g.ha}</span><span class="tf">${g.h}</span></div><div class="tl"><span class="ta">${g.aa}</span><span class="tf">${g.a}</span></div></div>
        ${sc}${pc}
      </div>${iE?det(g):''}`;
    }).join('');
    return`<div class="blk">
      <div class="bh" onclick="tB('${k}')"><span class="bh-flag">${L[lg].f}</span><span class="bh-name">${lg}</span><span class="bh-cnt">${list.length}</span><span class="chev open" id="c${k}">▾</span></div>
      <div id="b${k}">${rows}</div>
    </div>`;
  }).join('');
}

function tB(k){const b=document.getElementById('b'+k),c=document.getElementById('c'+k);const h=b.style.display==='none';b.style.display=h?'':'none';c.classList.toggle('open',h);}
function tE(id){expId=expId===id?null:id;render();}
function sD(ds){selD=ds;expId=null;buildD();buildL();render();}
function sL(l){selL=l;expId=null;buildL();render();}

buildD();buildL();render();
</script>
